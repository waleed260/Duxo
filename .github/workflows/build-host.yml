name: Build Host Agent

on:
  push:
    branches: [main, master]
    paths:
      - "host-agent/**"
      - ".github/workflows/build-host.yml"
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: duxo-host-x86_64-linux
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: duxo-host-x86_64-windows

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          components: clippy, rustfmt

      # §0.5 — Linux build dependencies for Tauri + AppImage.
      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libfuse2 \
            file

      # §0.13 step 13 — confirm X11 via Xvfb for capture testing.
      - name: Install Xvfb (for X11 capture testing)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get install -y xvfb

      - name: Cache Rust dependencies
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            host-agent/src-tauri/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('host-agent/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build host agent
        working-directory: host-agent/src-tauri
        run: cargo build --release --target ${{ matrix.target }}

      # §4.3 — cargo test: session state machine, JWT verification.
      - name: Run Rust unit tests
        working-directory: host-agent/src-tauri
        run: cargo test --target ${{ matrix.target }}

      # §7.5 — cargo audit for known Rust dependency vulnerabilities.
      - name: Cargo audit
        if: matrix.os == 'ubuntu-latest'
        run: |
          cargo install cargo-audit --locked || true
          cargo audit

      # §10.5 — clippy with -D warnings in CI to fail on any lint.
      - name: Clippy lint
        working-directory: host-agent/src-tauri
        run: cargo clippy --target ${{ matrix.target }} -- -D warnings

      # §10.5 — rustfmt check.
      - name: Rustfmt check
        working-directory: host-agent/src-tauri
        run: cargo fmt -- --check

      - name: Upload Windows binary
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: host-agent/src-tauri/target/${{ matrix.target }}/release/duxo-host.exe

      - name: Upload Linux binary
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: host-agent/src-tauri/target/${{ matrix.target }}/release/duxo-host
