# §7.1 — Release workflow: build, sign, and publish host agent binaries
# to GitHub Releases with Tauri updater update.json.
name: Release Host Agent

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Semantic version tag (e.g. v0.2.0)"
        required: true
        type: string

permissions:
  contents: write
  actions: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create.outputs.upload_url }}
    steps:
      - uses: actions/checkout@v7

      - name: Create release via gh CLI
        id: create
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ inputs.version }}" \
            --title "Duxo ${{ inputs.version }}" \
            --notes "See [CHANGELOG](./CHANGELOG.md) for details." \
            --draft=false \
            --prerelease=false
          echo "upload_url=https://api.github.com/repos/${{ github.repository }}/releases/tag/${{ inputs.version }}" >> $GITHUB_OUTPUT

  build-and-sign:
    name: Build + Sign (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
            binary_name: duxo-host
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_ext: zip
            binary_name: duxo-host.exe

    steps:
      - uses: actions/checkout@v7

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libfuse2

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            host-agent/src-tauri/target/
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('host-agent/src-tauri/Cargo.lock') }}

      - name: Build host agent (release)
        working-directory: host-agent/src-tauri
        run: cargo build --release --target ${{ matrix.target }}

      - name: Run Rust unit tests
        working-directory: host-agent/src-tauri
        run: cargo test --target ${{ matrix.target }}

      - name: Sign binary
        shell: bash
        env:
          SIGNING_KEY: ${{ secrets.UPDATER_SIGNING_KEY }}
        run: |
          echo "$SIGNING_KEY" > /tmp/signing.key
          npx @tauri-apps/cli@latest signer sign \
            -k /tmp/signing.key \
            -f host-agent/src-tauri/target/${{ matrix.target }}/release/${{ matrix.binary_name }}
          rm /tmp/signing.key
        continue-on-error: true

      - name: Package archive
        shell: bash
        run: |
          BINARY="host-agent/src-tauri/target/${{ matrix.target }}/release/${{ matrix.binary_name }}"
          ARCHIVE="duxo-host-${{ inputs.version }}-${{ matrix.target }}.${{ matrix.archive_ext }}"
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            7z a "$ARCHIVE" "$BINARY"
          else
            tar czf "$ARCHIVE" -C "$(dirname "$BINARY")" "${{ matrix.binary_name }}"
          fi
          echo "archive=$ARCHIVE" >> $GITHUB_ENV

      - name: Upload release asset via gh CLI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ inputs.version }}" "./${{ env.archive }}" --clobber

  update-manifest:
    runs-on: ubuntu-latest
    needs: build-and-sign
    steps:
      - uses: actions/checkout@v7

      - name: Update update.json manifest
        run: |
          cat > viewer/public/update.json <<EOF
          {
            "version": "${{ inputs.version }}",
            "notes": "Duxo ${{ inputs.version }} release.",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "linux-x86_64": {
                "signature": "",
                "url": "https://github.com/${{ github.repository }}/releases/download/${{ inputs.version }}/duxo-host-${{ inputs.version }}-x86_64-unknown-linux-gnu.tar.gz"
              },
              "windows-x86_64": {
                "signature": "",
                "url": "https://github.com/${{ github.repository }}/releases/download/${{ inputs.version }}/duxo-host-${{ inputs.version }}-x86_64-pc-windows-msvc.zip"
              }
            }
          }
          EOF
          # Also update docs/ copy
          cp viewer/public/update.json docs/update.json

      - name: Commit update manifest
        run: |
          git config user.name "Duxo Bot"
          git config user.email "bot@duxo.dev"
          git add viewer/public/update.json docs/update.json
          git commit -m "chore: update manifest to ${{ inputs.version }}"
          git push
